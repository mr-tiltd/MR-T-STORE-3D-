<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR-TILTD STORE | المتجر المودرن</title>
    <style>
        /* تعريف لوحة الألوان الجديدة: أبيض، سماوي، أسود */
        :root {
            --mrt-cyan: #00d4ff; /* السماوي */
            --mrt-black: #000000; /* الأسود */
            --mrt-dark: #1a1a1a;
            --mrt-white: #ffffff;
            --mrt-gray: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--mrt-white); color: var(--mrt-black); }

        /* الهيدر باللون الأسود والسماوي */
        header {
            background: var(--mrt-black);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--mrt-cyan);
        }

        .logo { color: var(--mrt-white); font-weight: 900; font-size: 26px; }
        .logo span { color: var(--mrt-cyan); }
        .search-bar { flex-grow: 1; margin: 0 20px; }
        .search-bar input { width: 100%; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--mrt-cyan); background: #111; color: white; outline: none; }

        /* زر الواتساب السماوي */
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: var(--mrt-cyan);
            color: var(--mrt-black);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(0,212,255,0.4);
            text-decoration: none;
            z-index: 10000;
            transition: 0.3s;
        }
        .whatsapp-badge {
            position: absolute;
            top: -5px;
            background: var(--mrt-black);
            color: var(--mrt-cyan);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid var(--mrt-cyan);
        }

        /* قسم التخصيص بالأسود والسماوي */
        .config-section {
            background: var(--mrt-black);
            color: var(--mrt-white);
            padding: 40px 5%;
            margin: 20px 5%;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            border-right: 5px solid var(--mrt-cyan);
        }

        .config-options label { display: block; margin: 10px 0; color: var(--mrt-cyan); font-weight: bold; }
        .config-options select, .config-options input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 15px;
        }

        .preview-card {
            background: var(--mrt-white); color: var(--mrt-black); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; border: 2px solid var(--mrt-cyan);
        }
        .preview-card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }

        /* شبكة المنتجات */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; padding: 20px 5%;
        }

        .p-card {
            background: var(--mrt-white); border-radius: 15px; overflow: hidden;
            border: 1px solid #eee; transition: 0.3s; display: flex; flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .p-card:hover { transform: translateY(-5px); border-color: var(--mrt-cyan); }
        .p-img { height: 180px; background: #fff; overflow: hidden; border-bottom: 1px solid #f0f0f0; }
        .p-img img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { padding: 15px; }
        .p-price { color: var(--mrt-black); font-weight: 800; font-size: 20px; margin: 5px 0; }
        .p-btn { background: var(--mrt-black); color: var(--mrt-cyan); border: 1px solid var(--mrt-cyan); width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .p-btn:hover { background: var(--mrt-cyan); color: var(--mrt-black); }

        /* الكومنتات */
        .comment-box { background: var(--mrt-gray); padding: 30px 5%; margin: 20px 5%; border-radius: 20px; }
        .comment-item { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .comment-btn { background: var(--mrt-black); color: var(--mrt-cyan); border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>

        const grid = document.getElementById('grid');
        prods.forEach(x => {
            grid.innerHTML += `
                <div class="p-card">
                    <div class="p-img"><img src="${x.i}" alt="${x.t}"></div>
                    <div class="p-info">
                        <div style="font-size:14px; font-weight:bold;">${x.t}</div>
                        <div class="p-price">₪ ${x.p}</div>
                        <button class="p-btn" onclick="window.open('https://wa.me/972534389724?text=طلب:%20${x.t}')">اطلب الآن</button>
                    </div>
                </div>
            `;
        });

        function sync() {
            const type = document.getElementById('pType').value;
            const name = document.getElementById('uName').value || "MR-T";
            const dCount = document.getElementById('dCount').value;
            const previewImg = document.getElementById('pImgPreview');
            
            document.getElementById('discSize').className = (type === 'disc') ? '' : 'hidden';
            
            if(type === 'disc') {
                previewImg.src = "https://m.media-amazon.com/images/I/718yGjZl1fL._AC_SL1500_.jpg";
                const prices = {"4":25, "6":35, "10":55};
                document.getElementById('pPrice').innerText = prices[dCount] + " ₪";
                document.getElementById('pDesc').innerText = "قاعدة ديسكات حجم " + dCount;
            } else if(type === 'tiktok') {
                previewImg.src = "https://m.media-amazon.com/images/I/51r26rF00mL.jpg";
                document.getElementById('pPrice').innerText = "50 ₪";
                document.getElementById('pDesc').innerText = "درع تيك توك مخصص";
            } else {
                previewImg.src = "https://m.media-amazon.com/images/I/61k2XfH-Z9L._AC_UF894,1000_QL80_.jpg";
                document.getElementById('pPrice').innerText = "40 ₪";
                document.getElementById('pDesc').innerText = "درع يوتيوب مخصص";
            }
            document.getElementById('pName').innerText = name;
        }

        function postComment() {
            const n = document.getElementById('cName').value;
            const t = document.getElementById('cText').value;
            if(!n || !t) return;
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `<strong>${n}:</strong> ${t}`;
            document.getElementById('cList').prepend(item);
            document.getElementById('cName').value = ""; document.getElementById('cText').value = "";
        }
    </script>
